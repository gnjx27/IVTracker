version: "3.9"

services:
  postgres:
    image: "postgres:15"
    container_name: ivtracker-db
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    
  redis:
    image: redis:7
    container_name: ivtracker-redis
    restart: unless-stopped
    ports: 
      - "6379:6379"

  web:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ivtracker-backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./server/.env
    depends_on:
      - postgres
      - redis
    ports: 
      - "8000:8000"
    volumes:
      - ./server:/app

  celery_worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ivtracker-celery
    command: celery -A ivtracker worker --loglevel=info
    env_file:
      - ./server/.env
    depends_on:
      - web
      - redis
  
  celery_beat:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ivtracker-beat
    command: celery -A ivtracker beat --loglevel=info
    env_file:
      - ./server/.env
    depends_on:
      - web
      - redis

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
